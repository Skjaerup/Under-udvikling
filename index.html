<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under udvikling</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(135deg, #f6f1e8 0%, #e2d4ba 100%);
            color: #2b2118;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 40%),
                linear-gradient(135deg, #f6f1e8 0%, #e2d4ba 100%);
        }

        main {
            padding: 3rem 4rem;
            text-align: center;
            border: 1px solid rgba(43, 33, 24, 0.12);
            border-radius: 24px;
            background: rgba(255, 252, 246, 0.8);
            box-shadow: 0 18px 40px rgba(43, 33, 24, 0.12);
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 6vw, 4rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <main>
        <h1>Under udvikling</h1>
    </main>
</body>
</html>
